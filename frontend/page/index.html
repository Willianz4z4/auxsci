<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evollogic Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%;
            height: 100dvh;
            background: #0a0214; 
            overflow: hidden; /* Evita barra de rolagem dupla */
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
        }

        /* Área do Menu Lateral */
        .sidebar-container {
            width: 280px; /* Largura fixa do menu */
            height: 100%;
            flex-shrink: 0;
            z-index: 10;
        }

        /* Área do Conteúdo Principal */
        .content-container {
            flex: 1; /* Ocupa o resto da tela */
            height: 100%;
            position: relative;
            background: radial-gradient(circle at top right, rgba(147, 51, 234, 0.05), transparent 40%), #0a0214;
        }

        /* Estilo dos Iframes para remover bordas padrão */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Adaptação Básica para Celular */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            .sidebar-container { width: 100%; height: auto; max-height: 40vh; }
            .content-container { height: 60vh; flex: auto; }
        }
    </style>
</head>
<body>

    <div class="sidebar-container">
        <iframe src="side.html" name="sidebar" title="Menu Lateral"></iframe>
    </div>

    <div class="content-container">
        <iframe src="config.html" name="content-frame" title="Conteúdo Principal"></iframe>
    </div>

</body>
</html>
