<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auxsci Hub - Encurtador e Monetização</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background-color: #0a0514; color: white; }
        .css-background { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: linear-gradient(-45deg, #0f0518, #2a0845, #14032e, #0a0014); background-size: 400% 400%; animation: gradientBG 10s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .video-background { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -2; opacity: 0; transition: opacity 1.5s ease; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, rgba(15, 5, 25, 0.7) 0%, rgba(5, 0, 10, 0.85) 100%); z-index: -1; }
        .top-btn { position: fixed; top: 25px; height: 50px; background: rgba(30, 10, 50, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(147, 51, 234, 0.4); border-radius: 14px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; transition: all 0.3s ease; color: #d8b4fe; font-weight: bold; }
        .top-btn:hover { background: rgba(147, 51, 234, 0.3); color: white; }
        .lang-btn { left: 25px; padding: 0 20px; gap: 8px; font-size: 14px; }
        .hamburger-menu { right: 25px; width: 50px; flex-direction: column; gap: 6px; }
        .hamburger-menu span { width: 24px; height: 2px; background-color: #d8b4fe; border-radius: 2px; transition: 0.3s; }
        .hamburger-menu.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); background-color: #fff; }
        .hamburger-menu.active span:nth-child(2) { opacity: 0; }
        .hamburger-menu.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); background-color: #fff; }
        .sidebar-backdrop { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 80; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .sidebar-backdrop.active { opacity: 1; pointer-events: all; }
        .sidebar-frame { position: fixed; top: 0; right: 0; width: 320px; max-width: 85vw; height: 100vh; border: none; z-index: 90; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: transparent; }
        .sidebar-frame.active { transform: translateX(0); }
        .main-wrapper { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
        .container { position: relative; z-index: 10; background: rgba(20, 10, 35, 0.5); padding: 40px 25px; border-radius: 24px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(147, 51, 234, 0.3); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(147, 51, 234, 0.15); text-align: center; max-width: 400px; width: 90%; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 30px; font-weight: 800; margin-bottom: 10px; text-shadow: 0 0 20px rgba(147, 51, 234, 0.6); }
        p { color: #d8b4fe; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        .input-group { display: flex; flex-direction: column; gap: 18px; }
        input { width: 100%; padding: 18px 20px; border: 2px solid rgba(147, 51, 234, 0.5); border-radius: 14px; font-size: 16px; outline: none; background: rgba(0, 0, 0, 0.7); color: #ffffff; transition: all 0.3s ease; text-align: center; }
        input:focus { border-color: #d8b4fe; background: rgba(10, 0, 20, 0.9); box-shadow: 0 0 25px rgba(147, 51, 234, 0.6); transform: scale(1.02); }
        button.btn-primary { width: 100%; padding: 18px; border: none; border-radius: 14px; background: linear-gradient(135deg, #9333ea 0%, #c084fc 100%); color: #ffffff; font-size: 16px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 25px rgba(147, 51, 234, 0.3); }
        button.btn-primary:hover { transform: translateY(-2px); filter: brightness(1.15); box-shadow: 0 12px 30px rgba(147, 51, 234, 0.5); }
        .footer-logo { margin-top: 30px; font-size: 12px; color: #8b5cf6; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
        .footer-logo span { color: #d8b4fe; font-weight: 900; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); z-index: 1000; background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; padding: 15px 25px; border-radius: 12px; font-weight: bold; backdrop-filter: blur(5px); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #toast.error { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.4); color: #ef4444; }
        @media (min-width: 768px) { .container { max-width: 550px; padding: 50px 40px; } }
    </style>
</head>
<body>
    <div class="css-background"></div>
    <video autoplay loop muted playsinline class="video-background" id="bg-video">
        <source src="https://cdn.pixabay.com/video/2021/08/11/84700-587843825_tiny.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="sidebar-backdrop" id="backdrop" onclick="toggleMenu()"></div>
    <iframe src="side.html" class="sidebar-frame" id="sidebar"></iframe>

    <div class="top-btn lang-btn" onclick="changeLanguage()">🌐 <span id="current-lang">PT</span></div>
    <div class="top-btn hamburger-menu" onclick="toggleMenu()" id="menu-btn"><span></span><span></span><span></span></div>

    <div class="main-wrapper">
        <div class="container">
            <h1 id="txt-title">Auxsci Hub</h1>
            <p id="txt-desc">Insira texto ou link e comece a monetizar em múltiplas camadas.</p>

            <div class="input-group">
                <input type="text" id="linkInput" placeholder="Cole texto ou link aqui..." required>
                <button class="btn-primary" onclick="enviarEncurtador()" id="txt-btn1">Encurtar e Monetizar</button>
            </div>
            <div class="footer-logo">by <span>Evollogic</span></div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const video = document.getElementById('bg-video');
        video.addEventListener('loadeddata', () => { video.style.opacity = '0.5'; });

        const dicionario = {
            "pt": { title: "Auxsci Hub", desc: "Insira texto ou link e comece a monetizar em camadas.", placeholder: "Cole texto ou link...", btn1: "Processar Camadas", alertVazio: "Insira algo primeiro!", alertSucesso: "Link gerado com sucesso!", processando: "Montando camadas...", erroSetup: "Ative Lootlabs ou Workink no Setup!" },
            "en": { title: "Auxsci Hub", desc: "Insert text or link and start monetizing in layers.", placeholder: "Paste text or link...", btn1: "Process Layers", alertVazio: "Insert something first!", alertSucesso: "Link successfully generated!", processando: "Building layers...", erroSetup: "Activate APIs in Setup!" },
            "es": { title: "Auxsci Hub", desc: "Inserta texto o enlace para monetizar en capas.", placeholder: "Pega texto o enlace...", btn1: "Procesar Capas", alertVazio: "¡Inserta algo primero!", alertSucesso: "¡Enlace generado!", processando: "Construyendo capas...", erroSetup: "¡Activa APIs en el Setup!" }
        };

        const langs = ["pt", "en", "es"];
        let currentLangIndex = 0;

        function applyLanguage(langCode) {
            const txt = dicionario[langCode];
            document.getElementById("txt-title").innerText = txt.title;
            document.getElementById("txt-desc").innerText = txt.desc;
            document.getElementById("linkInput").setAttribute("placeholder", txt.placeholder);
            document.getElementById("txt-btn1").innerText = txt.btn1;
            document.getElementById("current-lang").innerText = langCode.toUpperCase();
            localStorage.setItem('evollogic_lang', langCode);
        }

        function changeLanguage() {
            currentLangIndex = (currentLangIndex + 1) % langs.length;
            applyLanguage(langs[currentLangIndex]);
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const icon = isError ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>` : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            toast.innerHTML = `${icon} <span style="word-break: break-all; font-size: 14px;">${message}</span>`;
            if (isError) toast.classList.add('error'); else toast.classList.remove('error');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 4000);
        }

        window.onload = () => {
            let savedLang = localStorage.getItem('evollogic_lang') || "pt";
            if (!langs.includes(savedLang)) savedLang = "pt";
            currentLangIndex = langs.indexOf(savedLang);
            applyLanguage(savedLang);

            const savedInput = localStorage.getItem('auxsci_draft_link');
            if (savedInput) document.getElementById('linkInput').value = savedInput;
        };

        document.getElementById('linkInput').addEventListener('input', (e) => {
            localStorage.setItem('auxsci_draft_link', e.target.value);
        });

        async function enviarEncurtador() {
            const input = document.getElementById('linkInput');
            let targetUrl = input.value.trim();
            const currentTxt = dicionario[langs[currentLangIndex]];

            if (targetUrl === "") return showToast(currentTxt.alertVazio, true);

            // INTELIGÊNCIA: Se não for link (http), transforma num link do paste.html
            if (!/^https?:\/\//i.test(targetUrl)) {
                const textEncoded = encodeURIComponent(btoa(unescape(encodeURIComponent(targetUrl))));
                targetUrl = `https://willianz4z4.github.io/auxsci/frontend/page/paste.html?p=${textEncoded}`;
            }

            // Coleta os dados salvos nas configurações
            const savedKeys = JSON.parse(localStorage.getItem('evollogic_api_keys')) || {};
            const savedStates = JSON.parse(localStorage.getItem('evollogic_api_states')) || {};
            const customOrder = JSON.parse(localStorage.getItem('evollogic_provider_order')) || [];
            const advConfigs = JSON.parse(localStorage.getItem('evollogic_advanced_configs')) || {};
            const globalConfigs = JSON.parse(localStorage.getItem('evollogic_global_configs')) || {};
            
            let activeOrder = [];
            let activeKeys = {};

            // 1. Filtra quem realmente está ligado no Setup
            const enabledProviders = ['lootlabs', 'workink'].filter(p => savedStates[p] && savedKeys[p]);
            
            // 2. Aplica a ordem escolhida no Config.html (Lógica Dinâmica)
            if (customOrder.length > 0) {
                activeOrder = customOrder.filter(p => enabledProviders.includes(p));
            } else {
                activeOrder = enabledProviders; // Se o usuário não ordenou, pega o padrão
            }

            // 3. Monta as chaves na ordem certa
            activeOrder.forEach(p => activeKeys[p] = savedKeys[p]);

            if (activeOrder.length === 0) return showToast(currentTxt.erroSetup, true);

            const adShownTime = localStorage.getItem('ad_last_shown');
            const now = new Date().getTime();
            if (!adShownTime || (now - parseInt(adShownTime)) > (12 * 60 * 60 * 1000)) {
                const adLink = document.createElement('a');
                adLink.href = "https://poetrywishing.com/j999d3smpi?key=e86272e4e626290adf8acfa12599b9e9";
                adLink.target = "_blank";
                adLink.rel = "noopener noreferrer";
                document.body.appendChild(adLink);
                adLink.click();
                document.body.removeChild(adLink);
                localStorage.setItem('ad_last_shown', now.toString());
            }

            const btn = document.getElementById("txt-btn1");
            const textoAntigo = btn.innerText;
            btn.innerText = currentTxt.processando;

            try {
                // Envia pacote completo para o Railway (Ordem + Chaves + Configurações Avançadas)
                const response = await fetch("https://auxsci-production.up.railway.app", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        target_url: targetUrl,
                        order: activeOrder, 
                        api_keys: activeKeys, 
                        global_visuals: globalConfigs,
                        advanced_configs: advConfigs
                    })
                });

                const data = await response.json();

                if (data.status === "success") {
                    showToast(`${currentTxt.alertSucesso}`);
                    input.value = data.final_url;
                    localStorage.removeItem('auxsci_draft_link'); 
                } else {
                    showToast(`⚠️ Erro: ${data.message}`, true);
                }
            } catch (error) {
                showToast("❌ Falha de conexão com a API Evollogic.", true);
            } finally {
                btn.innerText = textoAntigo;
            }
        }

        function toggleMenu() {
            document.getElementById('menu-btn').classList.toggle('active');
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('backdrop').classList.toggle('active');
        }
    </script>
</body>
</html>
