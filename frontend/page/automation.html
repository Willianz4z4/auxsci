<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automação - Evollogic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; }
        body { 
            background: #0a0214; color: white; 
            padding: 30px; min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 { color: #d8b4fe; font-size: 24px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-new {
            background: rgba(180, 80, 255, 0.2); color: #d8b4fe; border: 1px solid #c084fc;
            padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-new:hover { background: #c084fc; color: #0a0214; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        .task-card {
            background: rgba(20, 4, 35, 0.8); border: 1px solid rgba(180, 80, 255, 0.2);
            padding: 20px; border-radius: 12px; transition: 0.3s; position: relative;
        }
        .task-card:hover { transform: translateY(-5px); border-color: #c084fc; box-shadow: 0 5px 15px rgba(180, 80, 255, 0.15); }
        
        .task-title { font-size: 18px; color: white; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .status { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .status.active { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .status.paused { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
        
        .task-desc { font-size: 13px; color: #a78bfa; margin-bottom: 15px; line-height: 1.4; }
        
        .toggle-btn {
            width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
            background: rgba(255,255,255,0.05); color: white; transition: 0.3s;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rotinas de Automação <button class="btn-new">+ Nova Rotina</button></h1>
        
        <div class="grid">
            <div class="task-card">
                <div class="task-title"><span class="status active"></span> Auto-Encurtador</div>
                <div class="task-desc">Encurta links automaticamente a cada 5 minutos usando a API primária.</div>
                <button class="toggle-btn">Pausar Rotina</button>
            </div>
            
            <div class="task-card">
                <div class="task-title"><span class="status paused"></span> Bypass Captcha</div>
                <div class="task-desc">Script de bypass para domínios secundários. Atualmente em manutenção.</div>
                <button class="toggle-btn">Ativar Rotina</button>
            </div>

            <div class="task-card">
                <div class="task-title"><span class="status active"></span> Limpeza de Cache</div>
                <div class="task-desc">Remove logs antigos e limpa o banco de dados temporário a cada 24h.</div>
                <button class="toggle-btn">Pausar Rotina</button>
            </div>
        </div>
    </div>
</body>
</html>
